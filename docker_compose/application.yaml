services:
  application:
    container_name: application
    build:
      context: ..
      dockerfile: Dockerfile
    env_file: ../.env
    ports:
      - "${PROJECT_PORT}:8000"
    volumes:
      - ..:/src
    command: bash -c "alembic upgrade head && uvicorn src.main:app_factory --host 0.0.0.0 --port 8000 --factory --reload"
    restart: always
